<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المعلم - مدرسة ذات الصواري</title>
    <style>
        :root { 
            --primary: #2e7d32; 
            --secondary: #fb8c00;
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #f1f8e9 100%);
            --accent: #455a64;
            --white: #ffffff;
        }

        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--accent); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
            direction: rtl; 
        }

        /* رأس الصفحة المطور */
        .header { 
            background: rgba(255, 255, 255, 0.9);
            padding: 25px; 
            border-radius: 25px; 
            border: 3px solid var(--primary); 
            text-align: center; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .school-name {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--primary);
            text-align: left;
        }

        .manager-info { text-align: right; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        
        .main-title { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary);
            margin: 15px 0; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .academic-year {
            background: var(--secondary);
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .designer-info { color: #888; font-weight: bold; font-size: 0.8rem; margin-top: 10px; }

        /* الأقسام */
        .setup-section { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 20px; 
            border-bottom: 5px solid var(--secondary);
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 2px solid #e0e0e0; 
            box-sizing: border-box; 
            font-weight: bold;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--secondary); outline: none; background: #fffcf5; }

        /* بطاقات الطلاب */
        .student-card { 
            background: var(--white); 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 15px; 
            border-right: 8px solid var(--primary);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .student-card:hover { transform: scale(1.02); }

        .abs-check { width: 25px; height: 25px; cursor: pointer; }

        .submit-btn { 
            background: linear-gradient(to left, #2e7d32, #43a047); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            width: 100%; 
            font-size: 1.1rem;
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
            transition: 0.3s;
        }

        .submit-btn:active { transform: scale(0.98); }

        #liveClock { 
            font-size: 1.2rem; 
            color: #d32f2f; 
            font-weight: 900; 
            margin: 10px 0;
            display: block; 
        }

        /* أيقونات توضيحية */
        .icon-box { font-size: 1.5rem; margin-left: 10px; }
    </style>
</head>

        const listDiv = document.getElementById('studentsList');
        listDiv.innerHTML = "";
        if(!cls) { document.getElementById('saveBtn').style.display = "none"; return; }
        document.getElementById('saveBtn').style.display = "block";
        flatList.forEach((s, i) => {
            if(s.cls === cls) {
                listDiv.innerHTML += `
                    <div class="student-card">
                        <span>👤 ${s.name}</span>
                        <input type="checkbox" class="abs-check" id="check_${i}">
                    </div>`;
            }
        });
    }

    async function saveData() {
        const teacher = document.getElementById('teacherName').value;
        const cls = document.getElementById('classSelect').value;
        const date = document.getElementById('attendanceDate').value;
        const timeAtLog = getCurrentTime(); 

        if(!teacher || !cls || !date) return alert("الرجاء إكمال جميع البيانات المطلوبة!");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "⏳ جاري مزامنة البيانات مع السحابة...";

        let db = [];
        try {
            const response = await fetch(SCRIPT_URL);
            const text = await response.text();
            db = JSON.parse(text);
        } catch (e) { db = []; }

        let day = db.find(e => e.d === date) || { d: date, a: [], notes: {}, logs: {} };
        if(!day.logs) day.logs = {};
        
        day.logs[cls] = { teacher: teacher, time: timeAtLog };

        flatList.forEach((s, i) => {
            if(s.cls === cls) {
                const sId = i.toString();
                const isChecked = document.getElementById(`check_${i}`).checked;
                if(isChecked && !day.a.includes(sId)) {
                    day.a.push(sId);
                } else if(!isChecked && day.a.includes(sId)) {
                    day.a = day.a.filter(v => v !== sId);
                }
            }
        });

        const others = db.filter(e => e.d !== date);
        others.push(day);

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(others),
                mode: 'no-cors'
            });

            alert(`✅ تم الرصد بنجاح!\nالمعلم: ${teacher}\nالصف: ${cls}\nالوقت: ${timeAtLog}`);
            location.reload();
        } catch (e) {
            alert("حدث خطأ في الاتصال!");
            btn.disabled = false;
            btn.innerText = "📤 إرسال كشف الغياب للإدارة";
        }
    }
</script>
</body>
</html>
