        }

            background: var(--header-pink); 
            padding: 25px 20px; 
            border-radius: 12px;

            text-align: center; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .top-row {

            margin-bottom: 10px;
            font-weight: 900;
            color: #333;

        .monitor-card { border-radius: 10px; padding: 10px; text-align: center; font-size: 0.8rem; border: 1px solid #ddd; display: flex; flex-direction: column; justify-content: center; }

        .status-pending { background-color: #fff3f3; border-color: #ffcdd2; color: #c62828; }

        .btn-action { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; min-width: 120px; color: white; }

        .btn-backup { background: #6d4c41; }

        .st-main { display: flex; justify-content: space-between; align-items: center; }

        th, td { border: 1px solid #d7ccc8; padding: 12px; text-align: center; }

</head>

    const channel = new BroadcastChannel('SCHOOL_SYNC_ANWAR');
    channel.onmessage = (event) => {
        if (event.data.type === 'TEACHER_LOG') {
            showNotification(event.data.cls, event.data.teacher, event.data.time);
            fetchFromCloud(); 
        }
    };

    function showNotification(cls, teacher, time) {
        const bar = document.getElementById('notify-bar');
        bar.innerHTML = `🔔 رصد جديد وصل الآن: <strong>${cls}</strong> (بواسطة ${teacher}) <br> <small>وقت الرصد: ${time}</small>`;
        bar.style.display = 'block';
        setTimeout(() => { bar.style.display = 'none'; }, 8000);
    }

    const filterSelect = document.getElementById('classFilter');
    Object.keys(dataGroups).forEach(cls => {
        let opt = document.createElement('option');
        opt.value = cls; opt.innerText = cls; filterSelect.appendChild(opt);
    });

    async function syncToCloud() {
        const db = localStorage.getItem('ANWAR_DATABASE_V2');
        try { 
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: db,
                mode: 'no-cors' 
            }); 
        } catch (e) { console.error("Cloud sync failed", e); }
    }

    async function fetchFromCloud() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            if(data && Array.isArray(data)) { 
                localStorage.setItem('ANWAR_DATABASE_V2', JSON.stringify(data)); 
                initApp(); 
            }
        } catch (e) { console.error("Fetch failed", e); }
    }

    function initApp() {
        const dateKey = document.getElementById('selectedDate').value;
        const clsFilter = document.getElementById('classFilter').value;
        const db = JSON.parse(localStorage.getItem('ANWAR_DATABASE_V2') || "[]");
        
        // جلب بيانات اليوم بما فيها سجلات المعلمين (logs) من السحابة
        const dayEntry = db.find(e => e.d === dateKey) || { d: dateKey, a: [], notes: {}, logs: {} };
        const cloudLogs = dayEntry.logs || {}; 

        const grid = document.getElementById('monitoringGrid');
        let mHtml = "";
        Object.keys(dataGroups).forEach(cls => {
            const log = cloudLogs[cls]; 
            if(log) {
                mHtml += `<div class="monitor-card status-done">
                            <strong>✅ ${cls}</strong>
                            <div class="monitor-info">بواسطة: ${log.teacher}</div>
                            <div class="monitor-time">الساعة: ${log.time}</div>
                          </div>`;
            } else {
                mHtml += `<div class="monitor-card status-pending"><strong>⚠️ ${cls}</strong><div class="monitor-info">انتظار الرصد...</div></div>`;
            }
        });
        grid.innerHTML = mHtml;

        let counters = {};
        db.forEach(e => e.a.forEach(id => { counters[id] = (counters[id] || 0) + 1; }));
        updateStats(db);

        let html = "";
        if(currentTab === 'T') {
            html = '<input type="text" class="search" placeholder="🔍 ابحث عن اسم طالب..." onkeyup="search(this.value)">';
            Object.keys(dataGroups).forEach(cls => {
                if(clsFilter !== "الكل" && cls !== clsFilter) return;
                html += `<div class="class-divider">${cls}</div>`;
                fullList.forEach((s, i) => {
                    if(s.c === cls) {
                        const isAbs = dayEntry.a.includes(i.toString());
                        const waMsg = `تحية طيبة، نود إحاطتكم علماً بأن الطالب/ة (${s.n}) غائب اليوم ${dateKey}. إدارة المدرسة.`;
                        const waLink = `https://wa.me/?text=${encodeURIComponent(waMsg)}`;
                        html += `
                        <div class="st-row" data-name="${s.n}">
                            <div class="st-main">
                                <span>${s.n} ${isAbs ? `<a href="${waLink}" target="_blank" class="btn-whatsapp">📱 واتساب</a>` : ''}</span>
                                <input type="checkbox" ${isAbs?'checked':''} onchange="toggleAbs(${i})">
                            </div>
                            <input type="text" class="note-input" placeholder="عذر أو ملاحظة..." style="display:${isAbs?'block':'none'}; width:100%; margin-top:5px; padding:8px; border-radius:5px; border:1px solid #ddd;" value="${dayEntry.notes[i] || ""}" onchange="saveNote(${i}, this.value)">
                        </div>`;
                    }
                });
            });
        } else {
            let dateMaps = {}; 
            db.forEach(e => { e.a.forEach(id => { if(!dateMaps[id]) dateMaps[id] = []; dateMaps[id].push(e.d); }); });
            Object.keys(dataGroups).forEach(cls => {
                if(clsFilter !== "الكل" && cls !== clsFilter) return;
                html += `<div class="class-divider">${cls}</div><div class="table-container"><table><thead><tr><th>الطالب</th><th>الإجمالي</th><th>التواريخ</th><th>تعديل</th><th>مسح</th></tr></thead><tbody>`;
                fullList.forEach((s, i) => {
                    if(s.c === cls) {
                        const count = counters[i] || 0;
                        html += `<tr><td style="font-weight:bold;">${s.n}</td><td class="${count >= 7 ? 'danger-text' : ''}">${count}</td><td>${dateMaps[i] ? dateMaps[i].join(' ، ') : "-"}</td><td><input type="checkbox" ${dayEntry.a.includes(i.toString())?'checked':''} onchange="toggleAbs(${i})"></td><td><button class="btn-del" onclick="deleteStudentRecord(${i})">🗑️</button></td></tr>`;
                    }
                });
                html += '</tbody></table></div>';
            });
        }
        document.getElementById('app-view').innerHTML = html;
    }

    async function toggleAbs(id) {
        const dateKey = document.getElementById('selectedDate').value;
        let db = JSON.parse(localStorage.getItem('ANWAR_DATABASE_V2') || "[]");
        let entry = db.find(e => e.d === dateKey);
        if(!entry) { entry = { d: dateKey, a: [], notes: {}, logs: {} }; db.push(entry); }
        let sId = id.toString();
        if(entry.a.includes(sId)) { entry.a = entry.a.filter(v => v !== sId); delete entry.notes[id]; }
        else { entry.a.push(sId); }
        localStorage.setItem('ANWAR_DATABASE_V2', JSON.stringify(db));
        initApp();
        await syncToCloud();
    }

    async function deleteStudentRecord(id) {
        if(!confirm(`هل أنتِ متأكدة؟`)) return;
        let db = JSON.parse(localStorage.getItem('ANWAR_DATABASE_V2') || "[]");
        db.forEach(entry => { entry.a = entry.a.filter(v => v !== id.toString()); });
        localStorage.setItem('ANWAR_DATABASE_V2', JSON.stringify(db));
        initApp();
        await syncToCloud();
    }

    async function saveNote(id, val) {
        const dateKey = document.getElementById('selectedDate').value;
        let db = JSON.parse(localStorage.getItem('ANWAR_DATABASE_V2') || "[]");
        let entry = db.find(e => e.d === dateKey);
        if(entry) { entry.notes[id] = val; localStorage.setItem('ANWAR_DATABASE_V2', JSON.stringify(db)); await syncToCloud(); }
    }

    function updateStats(db) {
        let total = 0, studentMap = {}, classMap = {};
        db.forEach(e => {
            total += e.a.length;
            e.a.forEach(id => {
                studentMap[id] = (studentMap[id] || 0) + 1;
                if(fullList[id]) { let cName = fullList[id].c; classMap[cName] = (classMap[cName] || 0) + 1; }
            });
        });
        let topId = Object.keys(studentMap).reduce((a, b) => studentMap[a] > studentMap[b] ? a : b, null);
        let topClass = Object.keys(classMap).reduce((a, b) => classMap[a] > classMap[b] ? a : b, "—");
        document.getElementById('statsArea').innerHTML = `<div class="stat-card"><small>مجموع الغيابات</small><div>${total}</div></div><div class="stat-card"><small>الأكثر غياباً</small><div>${topId ? fullList[topId].n : "—"}</div></div><div class="stat-card"><small>الصف الأكثر غياباً</small><div>${topClass}</div></div>`;
    }

    function setTab(t) { currentTab = t; document.getElementById('t-btn').className = t==='T'?'active':''; document.getElementById('s-btn').className = t==='S'?'active':''; initApp(); }
    function search(v) { document.querySelectorAll('.st-row').forEach(r => { r.style.display = r.getAttribute('data-name').includes(v) ? 'flex' : 'none'; }); }
    
    function exportToExcel() {
        const db = JSON.parse(localStorage.getItem('ANWAR_DATABASE_V2') || "[]");
        const wb = XLSX.utils.book_new();
        Object.keys(dataGroups).forEach(cls => {
            const wsData = [];
            fullList.forEach((s, i) => {
                if (s.c === cls) {
                    const studentAbsenceEntries = db.filter(e => e.a.includes(i.toString()));
                    const absenceCount = studentAbsenceEntries.length;
                    const absenceDates = studentAbsenceEntries.map(e => e.d).join(', ');
                    const status = absenceCount > 0 ? "غائب" : "حاضر";
                    wsData.push({ "اسم الطالب": s.n, "الحالة": status, "عدد مرات الغياب": absenceCount, "تواريخ الغياب": absenceDates || "لا يوجد" });
                }
            });
            if (wsData.length > 0) {
                const ws = XLSX.utils.json_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, cls);
            }
        });
        XLSX.writeFile(wb, `إحصائيات_الغياب_الشاملة.xlsx`);
    }

    function copyBackup() { const data = localStorage.getItem('ANWAR_DATABASE_V2'); navigator.clipboard.writeText(data); alert("تم نسخ الكود الاحتياطي!"); }
    function restoreBackup() { const b = prompt("الصق الكود هنا لاستعادة البيانات:"); if(b) { localStorage.setItem('ANWAR_DATABASE_V2', b); location.reload(); } }

    // بدء التطبيق والتحديث الدوري كل 30 ثانية
    fetchFromCloud();
    setInterval(fetchFromCloud, 30000); 

</script>
</body>
</html>
